    <g transform="rotate(-45)">
      <rect x="-12" y="-10" width="24" height="130" rx="8" fill="#f1f5f9" opacity="0.9"/>
      <circle cx="0" cy="-30" r="35" fill="none" stroke="#f1f5f9" stroke-width="14" opacity="0.9"/>
      <rect x="-18" y="100" width="36" height="30" rx="6" fill="#f1f5f9" opacity="0.9"/>
    </g>
  </g>
