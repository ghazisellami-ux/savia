# ==========================================
# 🐳 Docker Compose — SAVIA Platform
# ==========================================
# Usage:
#   1. cp .env.example .env && nano .env
#   2. docker compose up -d --build
#   3. docker compose logs -f
#
# Services:
#   - postgres  : Base de données PostgreSQL
#   - minio     : Stockage objet S3-compatible
#   - backend   : API FastAPI (Python)
#   - frontend  : Interface admin Next.js
#   - pwa-site  : PWA Techniciens terrain

services:
  # ── PostgreSQL Database ─────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible Object Storage) ─
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    restart: unless-stopped

  # ── FastAPI Backend ─────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      PORT: ${PORT:-8000}
      JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET:-savia-logs}
      S3_REGION: ${S3_REGION:-us-east-1}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GOOGLE_API_KEYS: ${GOOGLE_API_KEYS}
      MASTER_KEY: ${MASTER_KEY}
      ACCESS_CODE: ${ACCESS_CODE}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped

  # ── Next.js Admin Frontend ──────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://backend:8000}
      NODE_ENV: production
    depends_on:
      - backend
    restart: unless-stopped

  # ── SAVIA Site — PWA Techniciens ────────
  pwa-site:
    build:
      context: ./pwa-site
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://backend:8000}
      PORT: 3001
      HOSTNAME: 0.0.0.0
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  minio_data:
