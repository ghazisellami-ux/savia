
services:
  # --- PostgreSQL Database ---
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: savia
      POSTGRES_USER: savia
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-savia_secure_2026}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U savia -d savia"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- MinIO (S3-compatible Object Storage) ---
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-savia_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-savia_minio_secret_2026}
    command: server /data --console-address ":9001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- FastAPI Backend ---
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - PORT=8000
      - JWT_SECRET=${JWT_SECRET:-savia-super-secret-key-2026}
      - DATABASE_URL=postgresql://savia:${POSTGRES_PASSWORD:-savia_secure_2026}@postgres:5432/savia
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=${MINIO_ROOT_USER:-savia_admin}
      - S3_SECRET_KEY=${MINIO_ROOT_PASSWORD:-savia_minio_secret_2026}
      - S3_BUCKET=savia-logs
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped

  # --- Next.js Frontend ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8000
      - NODE_ENV=production
    depends_on:
      - backend
    restart: unless-stopped

  # --- pgAdmin (Interface visuelle PostgreSQL) ---
  pgadmin:
    image: dpage/pgadmin4:latest
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@savia.tn
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin_servers.json:/pgadmin4/servers.json:ro
      - ./pgpass:/pgadmin4/pgpass:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # --- SAVIA Site — PWA Techniciens (port 3001) ---
  pwa-site:
    build:
      context: ./pwa-site
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - BACKEND_URL=http://backend:8000
      - PORT=3001
      - HOSTNAME=0.0.0.0
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  minio_data:
  pgadmin_data:
